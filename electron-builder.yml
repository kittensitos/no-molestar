appId: com.nomolestar.app
productName: No Molestar
directories:
  output: dist
files:
  - src/**/*
  - "!src/**/*.map"
asar: true

win:
  target:
    - nsis
  icon: src/renderer/assets/icons/icon.png

mac:
  target:
    - dmg
    - zip
  icon: src/renderer/assets/icons/icon.icns
  category: public.app-category.music

linux:
  target:
    - AppImage
    - deb
  icon: src/renderer/assets/icons/icon.png
  category: Audio

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
