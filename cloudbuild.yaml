steps:
  - name: gcr.io/cloud-builders/gcloud
    id: Verify spotify branch
    entrypoint: bash
    args:
      - -c
      - |
        if [[ "$BRANCH_NAME" != "spotify" ]]; then
          echo "Skipping deploy: BRANCH_NAME=$BRANCH_NAME (expected spotify)"
          exit 1
        fi

  - name: gcr.io/cloud-builders/gcloud
    id: Deploy to Cloud Run from source
    args:
      - run
      - deploy
      - no-molestar
      - --source
      - .
      - --dockerfile
      - Dockerfile
      - --region
      - europe-west1
      - --project
      - $PROJECT_ID
      - --platform
      - managed
      - --allow-unauthenticated

options:
  logging: CLOUD_LOGGING_ONLY
