<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
  </style>
</head>
<body>
  <div id="player"></div>
  <script>
    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.body.appendChild(tag);

    function onYouTubeIframeAPIReady() {
      var p = new YT.Player('player', {
        height: '1',
        width: '1',
        playerVars: {
          autoplay: 0,
          controls: 0,
          disablekb: 1,
          fs: 0,
          modestbranding: 1,
        },
        events: {
          onReady: function () {
            if (window.setPlayerRef) window.setPlayerRef(p);
            if (window.onPlayerReady) window.onPlayerReady();
          },
          onStateChange: function (event) {
            if (window.onPlayerStateChange) window.onPlayerStateChange(event);
          },
          onError: function (event) {
            if (window.onPlayerError) window.onPlayerError(event);
          },
        },
      });
    }
  </script>
</body>
</html>
