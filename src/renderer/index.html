<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self';
                 style-src 'self' 'unsafe-inline';
                 img-src 'self' https://i.ytimg.com https://*.googleusercontent.com data:;
                 connect-src https://www.googleapis.com;
                 frame-src https://www.youtube.com;">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/crt-effects.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/setup-wizard.css">
  <title>No Molestar</title>
</head>
<body>
  <div id="crt-overlay"></div>

  <header id="title-bar">
    <span class="app-title">NO MOLESTAR</span>
    <div class="window-controls">
      <button id="btn-minimize">─</button>
      <button id="btn-maximize">□</button>
      <button id="btn-close" class="btn-close">✕</button>
    </div>
  </header>

  <div id="setup-wizard" class="hidden"></div>

  <div id="app" class="hidden">
    <section id="search-section"></section>
    <section id="now-playing-section"></section>
    <section id="controls-section"></section>
    <aside id="queue-panel" class="hidden"></aside>
  </div>

  <webview id="youtube-webview"
           src="youtube-embed.html"
           preload="../preload/webview-preload.js"
           style="width:0;height:0;position:absolute;visibility:hidden;pointer-events:none;"
           nodeintegration
           disablewebsecurity>
  </webview>

  <script type="module" src="js/app.js"></script>
</body>
</html>
